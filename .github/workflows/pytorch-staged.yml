name: Build and Push PyTorch in Stages

on:
  workflow_dispatch:
  push:
    # branches: [ main ]
    paths:
      - 'creator/**'
  pull_request:
    branches: [ main ]
    # paths:
      # - 'creator/**'
  schedule:
    - cron: '0 0 * * 0'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-base:
    name: Build Base Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        env:
          - {
              OS_VERSION: "24.04",
              TORCH: "2.8.0",
              VISION: "0.23.0",
              AUDIO: "2.8.0",
              MUJOCO: "3.4.0",
              GYM: "1.2.0",
              CUDA: "12.8.0",
              TAG: "cuda12.8-torch2.8"
            }
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build base stage
        uses: docker/build-push-action@v6
        with:
          context: .
          file: creator/pytorch/Dockerfile
          push: true
          target: base
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.env.TAG }}-base
          build-args: |
            BASE_IMAGE=ubuntu:24.04
            # nvidia/cuda:${{ matrix.env.CUDA }}-cudnn-devel-ubuntu${{ matrix.env.OS_VERSION }}

  build-mujoco:
    name: Install MuJoCo and Gymnasium
    runs-on: ubuntu-latest
    needs: build-base
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        env:
          - {
              OS_VERSION: "24.04",
              TORCH: "2.8.0",
              VISION: "0.23.0",
              AUDIO: "2.8.0",
              MUJOCO: "3.4.0",
              GYM: "1.2.0",
              CUDA: "12.8.0",
              TAG: "cuda12.8-torch2.8"
            }
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build mujoco stage
        uses: docker/build-push-action@v6
        with:
          context: .
          file: creator/pytorch/Dockerfile
          push: true
          target: mujoco
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.env.TAG }}-mujoco
          build-args: |
            BASE_IMAGE_MUJOCO=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.env.TAG }}-base
            MUJOCO_VERSION=${{ matrix.env.MUJOCO }}
            GYM_VERSION=${{ matrix.env.GYM }}

  build-pytorch:
    name: Install PyTorch
    runs-on: ubuntu-latest
    needs: build-mujoco
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        env:
          - {
              OS_VERSION: "24.04",
              TORCH: "2.8.0",
              VISION: "0.23.0",
              AUDIO: "2.8.0",
              MUJOCO: "3.4.0",
              GYM: "1.2.0",
              CUDA: "12.8.0",
              TAG: "cuda12.8-torch2.8"
            }
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build pytorch stage
        uses: docker/build-push-action@v6
        with:
          context: .
          file: creator/pytorch/Dockerfile
          push: true
          target: pytorch
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.env.TAG }}-pytorch
          build-args: |
            BASE_IMAGE_MUJOCO=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.env.TAG }}-base
            BASE_IMAGE_PYTORCH=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.env.TAG }}-mujoco
            TORCH_VERSION=${{ matrix.env.TORCH }}
            TORCHVISION_VERSION=${{ matrix.env.VISION }}
            TORCHAUDIO_VERSION=${{ matrix.env.AUDIO }}

  finalize:
    name: Final Image With User
    runs-on: ubuntu-latest
    needs: build-pytorch
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        env:
          - {
              OS_VERSION: "24.04",
              TORCH: "2.8.0",
              VISION: "0.23.0",
              AUDIO: "2.8.0",
              MUJOCO: "3.4.0",
              GYM: "1.2.0",
              CUDA: "12.8.0",
              TAG: "cuda12.8-torch2.8"
            }
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build final image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: creator/pytorch/Dockerfile
          push: true
          target: final
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.env.TAG }}
          build-args: |
            BASE_IMAGE_MUJOCO=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.env.TAG }}-base
            BASE_IMAGE_PYTORCH=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.env.TAG }}-mujoco
            BASE_IMAGE_FINAL=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.env.TAG }}-pytorch
            MUJOCO_VERSION=${{ matrix.env.MUJOCO }}
            GYM_VERSION=${{ matrix.env.GYM }}
            TORCH_VERSION=${{ matrix.env.TORCH }}
            TORCHVISION_VERSION=${{ matrix.env.VISION }}
            TORCHAUDIO_VERSION=${{ matrix.env.AUDIO }}

  cleanup-intermediates:
    name: Delete intermediate stage tags
    runs-on: ubuntu-latest
    needs: finalize
    # Only the final image (:<TAG>) is meant to persist. Delete the intermediate
    # stage tags (-base/-mujoco/-pytorch) once the final image has been pushed.
    # Skipped on PRs (which don't push).
    if: ${{ always() && github.event_name != 'pull_request' }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        env:
          - { TAG: "cuda12.8-torch2.8" }
    steps:
      - name: Delete -base/-mujoco/-pytorch tagged versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ matrix.env.TAG }}
        run: |
          set -euo pipefail
          OWNER="${REPO%%/*}"
          PACKAGE="${REPO#*/}"
          OWNER_TYPE=$(gh api "/repos/${REPO}" --jq '.owner.type')
          BASE_PATH="/users/${OWNER}"
          if [[ "${OWNER_TYPE}" == "Organization" ]]; then
            BASE_PATH="/orgs/${OWNER}"
          fi

          echo "Cleaning intermediate stage tags for ${PACKAGE} (prefix ${TAG})"
          if ! VERSIONS=$(gh api --paginate "${BASE_PATH}/packages/container/${PACKAGE}/versions?per_page=100" --jq '.[]' | jq -s '.'); then
            echo "Package '${PACKAGE}' not found. Skipping."
            exit 0
          fi

          # Select versions whose tags include one of the intermediate stage tags.
          SELECTION=$(echo "${VERSIONS}" | jq --arg tag "${TAG}" '
            map(select(type == "object"))
            | map(
                (.metadata? // {}) as $m
                | ($m.container.tags // []) as $tags
                | select(
                    ($tags | any(. == "\($tag)-base" or . == "\($tag)-mujoco" or . == "\($tag)-pytorch"))
                  )
              )
          ')

          if [[ -z "${SELECTION}" || "${SELECTION}" == "[]" ]]; then
            echo "No intermediate stage tags to delete."
            exit 0
          fi

          echo "Deleting intermediate versions:"
          echo "${SELECTION}" | jq -r '.[] | "- id: \(.id) tags: \((.metadata.container.tags // []) | join(", "))"'

          echo "${SELECTION}" | jq -r '.[].id' | while read -r id; do
            [[ -z "${id}" ]] && continue
            gh api -X DELETE "${BASE_PATH}/packages/container/${PACKAGE}/versions/${id}"
          done
